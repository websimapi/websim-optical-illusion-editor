<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Optical Illusion Editor</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "cal-sans/": "https://cdn.jsdelivr.net/npm/@fontsource-variable/inter@4.5.13/variable.css"
    }
  }
  </script>
</head>
<body>
  <div class="app">
    <header>
      <h1>Optical Illusion Studio</h1>
      <p class="muted">Upload an image and bend reality — Escher-like warps, recursion, symmetry.</p>
    </header>

    <main>
      <canvas id="illusion" width="800" height="600"></canvas>

      <aside class="controls">
        <label class="file">
          Image
          <input id="file" type="file" accept="image/*">
        </label>

        <div class="control-row">
          <label>Swirl Strength <output id="swirlOut">1.0</output></label>
          <input id="swirl" type="range" min="0" max="6" step="0.01" value="1">
        </div>

        <div class="control-row">
          <label>Wave Intensity <output id="waveOut">0.05</output></label>
          <input id="wave" type="range" min="0" max="0.2" step="0.001" value="0.05">
        </div>

        <div class="control-row">
          <label>Recursion (tiles) <output id="recurOut">1</output></label>
          <input id="recursion" type="range" min="1" max="8" step="1" value="1">
        </div>

        <div class="control-row">
          <label>Symmetry</label>
          <select id="symmetry">
            <option value="1">None</option>
            <option value="2">Mirror X</option>
            <option value="3">Mirror Y</option>
            <option value="4">Rotational 4</option>
            <option value="6">Rotational 6</option>
          </select>
        </div>

        <div class="control-row">
          <label>Perspective Skew <output id="skewOut">0.0</output></label>
          <input id="skew" type="range" min="-0.5" max="0.5" step="0.001" value="0">
        </div>

        <div class="buttons">
          <button id="random">Randomize</button>
          <button id="aiAlter">AI Alter</button>
          <button id="download">Download PNG</button>
        </div>

        <p class="hint">Tip: increase recursion + symmetry for more Escher-like patterns.</p>
      </aside>
    </main>

    <footer>
      <small>Simple, non-commercial demo • WebGL shader processing</small>
    </footer>
  </div>

  <script type="module" src="main.js"></script>

</html>
